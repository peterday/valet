{{define "secret_row"}}
<tr class="border-b border-slate-700/50 hover:bg-slate-700/20 transition-colors">
  <td class="p-4 font-mono text-sm text-white">{{.Key}}</td>
  <td class="p-4">
    {{if .Provider}}
    <span class="text-xs px-2 py-0.5 rounded-full bg-purple-500/20 text-purple-400">{{.Provider}}</span>
    {{else}}
    <span class="text-slate-500">—</span>
    {{end}}
  </td>
  <td class="p-4 font-mono text-xs text-slate-400">{{.Scope}}</td>
  <td class="p-4 text-sm text-slate-400">{{.UpdatedAt}}</td>
  <td class="p-4 text-sm text-slate-400">{{.UpdatedBy}}</td>
</tr>
{{end}}
